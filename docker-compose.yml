services:
  db:
    container_name: udar-crm-postgres
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    container_name: udar-crm-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: udar-crm-backend
    image: udar_crm-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT_HOST:-8000}:8000"
    command: ["bash", "/app/docker/entrypoint.sh", "dev"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport json, urllib.request\npayload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3))\nraise SystemExit(0 if payload.get('db') == 'ok' and payload.get('redis') == 'ok' else 1)\nPY"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    container_name: udar-crm-frontend
    image: udar_crm-frontend-dev
    build:
      context: .
      dockerfile: frontend.Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT_HOST:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  celery_worker:
    container_name: udar-crm-celery-worker
    image: udar_crm-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    command: ["bash", "/app/docker/entrypoint.sh", "celery-worker"]
    depends_on:
      backend:
        condition: service_healthy

  celery_beat:
    container_name: udar-crm-celery-beat
    image: udar_crm-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    command: ["bash", "/app/docker/entrypoint.sh", "celery-beat"]
    depends_on:
      backend:
        condition: service_healthy

  adminer:
    container_name: udar-crm-db-admin
    image: adminer:4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT_HOST:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  redisinsight:
    container_name: udar-crm-redis-admin
    image: redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REDISINSIGHT_PORT_HOST:-5540}:5540"
    volumes:
      - redisinsight_data:/data

volumes:
  pgdata:
  redisdata:
  backend_static:
  backend_media:
  frontend_node_modules:
  redisinsight_data:
